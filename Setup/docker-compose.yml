services:
  api:
    image: node:20
    container_name: tattoo-api
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./web:/app/web
      - ./uploads:/app/uploads
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3000"
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: tattoo-db
    environment:
      POSTGRES_USER: tattoo
      POSTGRES_PASSWORD: ink123
      POSTGRES_DB: tattooapp
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
