<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3tal Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  background: #020617;
  color: #38bdf8;
  font-family: monospace;
}

.card {
  background: #0f172a;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 0 10px #38bdf8;
}

button {
  margin: 3px;
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.restart { background: #f59e0b; }
</style>
</head>

<body>

<h2>⚡ M3tal Control Panel</h2>

<div id="containers">Loading...</div>

<script>
const API = "http://192.168.12.156:5000";
const API_KEY = "CHANGE_THIS_TO_STRONG_KEY";

async function load() {
  const res = await fetch(API + "/containers", {
    headers: { "X-API-Key": API_KEY }
  });

  const data = await res.json();
  const div = document.getElementById("containers");
  div.innerHTML = "";

  data.forEach(c => {
    div.innerHTML += `
      <div class="card">
        <b>${c.name}</b><br>
        ${c.status} | ${c.cpu} | ${c.mem}<br>
        <button class="start" onclick="act('${c.name}','start')">Start</button>
        <button class="stop" onclick="act('${c.name}','stop')">Stop</button>
        <button class="restart" onclick="act('${c.name}','restart')">Restart</button>
      </div>
    `;
  });
}

async function act(name, cmd) {
  await fetch(`${API}/${cmd}/${name}`, {
    headers: { "X-API-Key": API_KEY }
  });
  load();
}

setInterval(load, 4000);
load();
</script>

</body>
</html>
