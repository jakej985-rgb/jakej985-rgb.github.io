<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>M3tal Control Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: sans-serif;
      padding: 10px;
    }
    h1 {
      text-align: center;
      color: #38bdf8;
    }
    .card {
      background: #1e293b;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
    }
    button {
      margin: 3px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .start { background: #22c55e; }
    .stop { background: #ef4444; }
    .restart { background: #f59e0b; }
  </style>
</head>

<body>
<h1>⚡ M3tal Panel</h1>

<div id="containers">Loading...</div>

<script>
const API = "http://YOUR_SERVER_IP:5000"; // CHANGE THIS

async function loadContainers() {
  const res = await fetch(API + "/containers");
  const data = await res.json();

  const containerDiv = document.getElementById("containers");
  containerDiv.innerHTML = "";

  data.forEach(c => {
    containerDiv.innerHTML += `
      <div class="card">
        <b>${c.name}</b><br>
        Status: ${c.status}<br>
        CPU: ${c.cpu} | RAM: ${c.mem}
        <br><br>
        <button class="start" onclick="action('${c.name}','start')">Start</button>
        <button class="stop" onclick="action('${c.name}','stop')">Stop</button>
        <button class="restart" onclick="action('${c.name}','restart')">Restart</button>
      </div>
    `;
  });
}

async function action(name, cmd) {
  await fetch(`${API}/${cmd}/${name}`);
  loadContainers();
}

loadContainers();
setInterval(loadContainers, 5000);
</script>
</body>
</html>
